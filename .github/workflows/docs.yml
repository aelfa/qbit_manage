# Syncs docs/ â†” GitHub Wiki bidirectionally on doc pushes (docsâ†’wiki) or wiki edits (wikiâ†’docs).
name: Documentation

on:
  push:
    branches:
      - develop
    paths:
      - "docs/**"
  repository_dispatch:
    types: [docs]
  gollum:

concurrency:
  # Single group across push + gollum so the two sync directions don't race.
  # cancel-in-progress: false â€” let an in-flight sync finish before the next runs.
  group: docs-sync
  cancel-in-progress: false

env:
  GIT_AUTHOR_NAME: Actionbot
  GIT_AUTHOR_EMAIL: actions@github.com

jobs:
  sync-docs-to-wiki:
    runs-on: ubuntu-latest
    if: github.event_name != 'gollum' && github.repository == 'StuffAnThings/qbit_manage'
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7
      - name: Sync docs to wiki
        # PAT required: wiki and main repo are separate GitHub repositories
        uses: newrelic/wiki-sync-action@8fb7a9efe4e975bdb2977107fbed96fa0433db52
        with:
          source: docs
          destination: wiki
          token: ${{ secrets.PAT }}
          gitAuthorName: ${{ env.GIT_AUTHOR_NAME }}
          gitAuthorEmail: ${{ env.GIT_AUTHOR_EMAIL }}

  sync-wiki-to-docs:
    runs-on: ubuntu-latest
    if: github.event_name == 'gollum' && github.repository == 'StuffAnThings/qbit_manage'
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT }} # allows us to push back to repo
          ref: develop
      - name: Sync Wiki to Docs
        # PAT required: wiki and main repo are separate GitHub repositories
        uses: newrelic/wiki-sync-action@8fb7a9efe4e975bdb2977107fbed96fa0433db52
        with:
          source: wiki
          destination: docs
          token: ${{ secrets.PAT }}
          gitAuthorName: ${{ env.GIT_AUTHOR_NAME }}
          gitAuthorEmail: ${{ env.GIT_AUTHOR_EMAIL }}
          branch: develop

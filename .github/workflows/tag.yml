# Tags the new version on every push to master using the VERSION file.
name: Tag New Version

on:
  push:
    branches: [ master ]
  # Manual recovery lever if a master push is ever skipped.
  workflow_dispatch:

concurrency:
  group: tag-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Upstream-only: PAT secret writes tags on the upstream repo.
    if: github.repository == 'StuffAnThings/qbit_manage'
    steps:

      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 2

      # Pinned per supply-chain hygiene; bump SHA on next dependabot review
      - uses: Kometa-Team/tag-new-version@1dd1fb186f3f5229331e8ddf6515288633a2412e
        with:
          version-command: |
            cat VERSION
